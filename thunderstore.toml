[config]
schemaVersion = "0.0.1"


[package]
namespace = "zerp"
name = "AspectExtender"
versionNumber = "0.0.3"
description = "Hades II mod allowing more than 4 weapon aspects to exist and function properly"
websiteUrl = "https://github.com/adi1998/AspectExtender"
containsNsfwContent = false

[package.dependencies]
Hell2Modding-Hell2Modding = "1.0.94"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"

# Uncomment (remove the #) the three lines below if you have any files to copy to the plugins_data folder (like custom .pkg files)
# [[build.copy]]
# source = "./data"
# target = "./plugins_data"


[publish]
repository = "https://thunderstore.io"
communities = [ "hades-ii", ]

[publish.categories]
hades-ii = [ "mods", ]








